included:
  - CommandFlow/Sources

disabled_rules:
  - trailing_whitespace
  - trailing_comma
  - type_body_length
  - file_length
  - function_parameter_count
  - optional_data_string_conversion
  - for_where

opt_in_rules:
  - empty_count
  - sorted_imports

line_length:
  warning: 180
  error: 240

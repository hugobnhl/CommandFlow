name: CommandFlow
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: CommandFlow
    PRODUCT_BUNDLE_IDENTIFIER: com.hugobrun.commandflow.dev
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 14.0
    SWIFT_VERSION: 5.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: CommandFlow
    INFOPLIST_KEY_LSUIElement: YES
    CODE_SIGN_STYLE: Automatic
targets:
  CommandFlow:
    type: application
    platform: macOS
    sources:
      - path: CommandFlow/Sources
    resources:
      - path: CommandFlow/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugobrun.commandflow.dev
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      testTargets: []

